<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מנהל חבילות משאבים – Minecraft</title>
<script src="vendor/jszip.min.js"></script>
<style>
  :root{
    --bg:#0f1216; --panel:#171b21; --panel2:#1e242c; --line:#2a323c;
    --text:#e6ebf1; --muted:#93a1b0; --accent:#4ea1ff; --accent2:#3ad29f;
    --danger:#ff6b6b; --warn:#f6c453; --chip:#242c36;
    --radius:10px; --shadow:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Segoe UI",system-ui,Arial,sans-serif; font-size:14px; line-height:1.5;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:12px; padding:10px 16px;
    background:linear-gradient(180deg,#1a2028,#141920); border-bottom:1px solid var(--line);
  }
  header h1{font-size:16px; margin:0; font-weight:600}
  header .grow{flex:1}
  .badge{font-size:11px; color:var(--muted); background:var(--chip); padding:3px 8px; border-radius:20px}
  .layout{flex:1; display:flex; min-height:0}
  aside{
    width:250px; background:var(--panel); border-inline-start:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
  }
  aside .head{padding:12px; border-bottom:1px solid var(--line); display:flex; gap:8px}
  #projectList{flex:1; overflow:auto; padding:6px}
  .proj{
    padding:9px 10px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:8px;
    border:1px solid transparent;
  }
  .proj:hover{background:var(--panel2)}
  .proj.active{background:var(--panel2); border-color:var(--accent)}
  .proj .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .proj .ct{font-size:11px; color:var(--muted)}
  main{flex:1; overflow:auto; padding:18px 22px; min-width:0}
  .empty{color:var(--muted); text-align:center; margin-top:80px}
  h2{font-size:18px; margin:0 0 2px}
  .sub{color:var(--muted); font-size:12px; margin-bottom:16px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:16px}
  .card h3{margin:0 0 10px; font-size:14px; display:flex; align-items:center; gap:8px}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  label.fld{display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted)}
  input,select,textarea{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; font:inherit; outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  input[type=text],input[type=url]{min-width:220px}
  button{
    background:var(--accent); color:#04121f; border:none; border-radius:8px;
    padding:8px 14px; font:inherit; font-weight:600; cursor:pointer;
  }
  button:hover{filter:brightness(1.08)}
  button.ghost{background:var(--chip); color:var(--text); font-weight:500}
  button.sm{padding:4px 9px; font-size:12px}
  button.danger{background:var(--danger); color:#160404}
  button.ok{background:var(--accent2); color:#04140d}
  button:disabled{opacity:.45; cursor:not-allowed; filter:none}
  .src{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line);
    border-radius:9px; margin-bottom:8px; background:var(--panel2);
  }
  .src.disabled{opacity:.5}
  .src.dragging{opacity:.4; border-color:var(--accent)}
  .src.over{border-color:var(--accent2); box-shadow:0 0 0 2px rgba(58,210,159,.25)}
  .src .grip{cursor:grab; color:var(--muted); font-size:18px; user-select:none; padding:0 2px}
  .src .grip:active{cursor:grabbing}
  .prio-legend{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; font-size:12px; margin-bottom:10px; padding:6px 10px; background:var(--panel2); border-radius:8px}
  .prio-legend .dim{color:var(--muted)}
  .prio-tag{font-size:10px; padding:1px 7px; border-radius:20px}
  .prio-tag.top{background:rgba(58,210,159,.2); color:var(--accent2)}
  .prio-tag.bottom{background:var(--chip); color:var(--muted)}
  .src .prio{font-size:12px; font-weight:700; color:var(--accent); width:20px; text-align:center}
  .src .ico{width:26px;height:26px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--chip);font-size:14px}
  .src .info{flex:1; min-width:0}
  .src .info .t{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .src .info .d{font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .src .ctrls{display:flex; gap:4px; align-items:center}
  .chip{font-size:10px; padding:2px 7px; border-radius:20px; background:var(--chip); color:var(--muted)}
  .chip.m{color:#062; background:#bff0d8}
  .chip.warnc{color:#3a2c00; background:#f6c453}
  .toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:6px}
  .log{
    background:#0b0e12; border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    font-family:ui-monospace,Consolas,monospace; font-size:12px; white-space:pre-wrap;
    max-height:260px; overflow:auto; margin-top:12px;
  }
  .log .ok{color:var(--accent2)} .log .warn{color:var(--warn)} .log .err{color:var(--danger)} .log .dim{color:var(--muted)}
  dialog{
    background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:12px;
    padding:0; width:min(560px,92vw); box-shadow:var(--shadow);
  }
  dialog::backdrop{background:rgba(0,0,0,.55)}
  .dlg-h{padding:14px 16px; border-bottom:1px solid var(--line); font-weight:600; font-size:15px}
  .dlg-b{padding:16px}
  .dlg-f{padding:12px 16px; border-top:1px solid var(--line); display:flex; gap:8px; justify-content:flex-start}
  .seg{display:flex; gap:0; border:1px solid var(--line); border-radius:8px; overflow:hidden; width:fit-content}
  .seg button{background:var(--panel2); color:var(--text); border-radius:0; font-weight:500}
  .seg button.on{background:var(--accent); color:#04121f}
  .hint{font-size:12px; color:var(--muted); margin:8px 0}
  .verlist{max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:8px; margin-top:8px}
  .ver{padding:8px 10px; border-bottom:1px solid var(--line); cursor:pointer; display:flex; gap:8px; align-items:center}
  .ver:last-child{border-bottom:none}
  .ver:hover{background:var(--panel2)}
  .ver.sel{background:rgba(78,161,255,.15)}
  .ver .vn{flex:1}
  .ver .vg{font-size:11px; color:var(--muted)}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:var(--accent)}
  code{background:var(--chip); padding:1px 6px; border-radius:5px; font-family:ui-monospace,Consolas,monospace; font-size:12px}
  table.res{width:100%; border-collapse:collapse; font-size:13px}
  table.res th{text-align:right; padding:6px 8px; border-bottom:1px solid var(--line); color:var(--muted); font-weight:600; font-size:11px}
  table.res td{padding:6px 8px; border-bottom:1px solid var(--line)}
  table.res td.path{font-family:ui-monospace,Consolas,monospace; font-size:11px; color:var(--muted); direction:ltr; text-align:right}
  .chip.link{cursor:pointer; text-decoration:underline dotted}
  .chip.link:hover{color:var(--accent)}
  .iconbox{width:56px;height:56px;flex:none;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
    display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;background-size:cover;background-position:center}
</style>
</head>
<body>
<header>
  <h1>🧩 מנהל חבילות משאבים — Minecraft</h1>
  <span class="badge" id="storeBadge"></span>
  <div class="grow"></div>
  <span class="badge">נשמר אוטומטית בדפדפן</span>
</header>

<div class="layout">
  <aside>
    <div class="head">
      <button id="newProjBtn" style="flex:1">➕ פרויקט חדש</button>
      <button id="importProjBtn" class="ghost" title="ייבוא פרויקט מקובץ JSON">📥</button>
      <input type="file" id="importProjFile" accept=".json" style="display:none">
    </div>
    <div id="projectList"></div>
  </aside>
  <main id="main"></main>
</div>

<!-- Add-source dialog -->
<dialog id="addDlg">
  <div class="dlg-h">הוספת מקור</div>
  <div class="dlg-b">
    <div class="seg" id="kindSeg">
      <button data-kind="modrinth" class="on">Modrinth</button>
      <button data-kind="curseforge">CurseForge</button>
      <button data-kind="planetminecraft">PlanetMinecraft</button>
      <button data-kind="upload">קובץ ZIP</button>
    </div>

    <div id="linkArea" style="margin-top:14px">
      <label class="fld">קישור למקור
        <input type="url" id="srcUrl" placeholder="https://modrinth.com/resourcepack/...">
      </label>
      <div class="hint" id="linkHint"></div>
      <div class="row" style="margin-top:8px">
        <button id="resolveBtn">🔎 חפש גרסאות</button>
        <span id="resolveStatus" class="hint" style="margin:0"></span>
      </div>
      <label class="fld" style="margin-top:10px; flex-direction:row; align-items:center; gap:6px">
        <input type="checkbox" id="onlyCompat" checked style="min-width:auto">
        <span>הצג רק גרסאות שתואמות ל־<b id="tgtVerLbl"></b></span>
      </label>
      <div class="verlist" id="verList" style="display:none"></div>
    </div>

    <div id="uploadArea" style="margin-top:14px; display:none">
      <label class="fld">בחר קובץ/י ZIP של חבילת משאבים
        <input type="file" id="srcFile" accept=".zip" multiple>
      </label>
      <div class="hint">אפשר לבחור כמה קבצים בבת אחת. הם נשמרים בדפדפן ולא יימחקו ברענון.</div>
    </div>

    <div id="manualZip" style="margin-top:12px; display:none">
      <div class="hint" style="color:var(--warn)">⚠️ אי אפשר להוריד אוטומטית מ־CurseForge/PlanetMinecraft מהדפדפן. הדבק את הקישור לתיעוד, ולאחר מכן העלה כאן את קובץ ה־ZIP שהורדת ידנית.</div>
      <label class="fld" style="margin-top:8px">קובץ ZIP שהורדת
        <input type="file" id="manualFile" accept=".zip">
      </label>
    </div>
  </div>
  <div class="dlg-f">
    <button id="addConfirm" class="ok">הוסף מקור</button>
    <button class="ghost" onclick="document.getElementById('addDlg').close()">ביטול</button>
  </div>
</dialog>

<script>
/* ============================================================
   מנהל חבילות משאבים למיינקראפט — לוגיקה
   ============================================================ */

// ---- pack_format לפי גרסת מיינקראפט (resource packs) ----
// gv = מחרוזת התאימות של Modrinth (בד"כ זהה ל-v). מקובץ לפי דור להצגה.
const VERSIONS = [
  // ----- 2026 (מספור year.drop) -----
  {v:"26.2",   pf:88, g:"2026"},
  {v:"26.1.2", pf:84, g:"2026"},
  {v:"26.1.1", pf:84, g:"2026"},
  {v:"26.1",   pf:84, g:"2026"},
  // ----- 1.21.x -----
  {v:"1.21.11",pf:75, g:"1.21.x"},
  {v:"1.21.10",pf:69, g:"1.21.x"},
  {v:"1.21.9", pf:69, g:"1.21.x"},
  {v:"1.21.8", pf:64, g:"1.21.x"},
  {v:"1.21.7", pf:64, g:"1.21.x"},
  {v:"1.21.6", pf:63, g:"1.21.x"},
  {v:"1.21.5", pf:55, g:"1.21.x"},
  {v:"1.21.4", pf:46, g:"1.21.x"},
  {v:"1.21.3", pf:42, g:"1.21.x"},
  {v:"1.21.2", pf:42, g:"1.21.x"},
  {v:"1.21.1", pf:34, g:"1.21.x"},
  {v:"1.21",   pf:34, g:"1.21.x"},
  // ----- 1.20.x -----
  {v:"1.20.6", pf:32, g:"1.20.x"},
  {v:"1.20.5", pf:32, g:"1.20.x"},
  {v:"1.20.4", pf:22, g:"1.20.x"},
  {v:"1.20.3", pf:22, g:"1.20.x"},
  {v:"1.20.2", pf:18, g:"1.20.x"},
  {v:"1.20.1", pf:15, g:"1.20.x"},
  {v:"1.20",   pf:15, g:"1.20.x"},
  // ----- ישן יותר -----
  {v:"1.19.4", pf:13, g:"ישן יותר"},
  {v:"1.19.3", pf:12, g:"ישן יותר"},
  {v:"1.19.2", pf:9,  g:"ישן יותר"},
  {v:"1.19",   pf:9,  g:"ישן יותר"},
  {v:"1.18.2", pf:8,  g:"ישן יותר"},
  {v:"1.18",   pf:8,  g:"ישן יותר"},
  {v:"1.17.1", pf:7,  g:"ישן יותר"},
  {v:"1.17",   pf:7,  g:"ישן יותר"},
  {v:"1.16.5", pf:6,  g:"ישן יותר"},
  {v:"1.16.2", pf:6,  g:"ישן יותר"},
  {v:"1.16.1", pf:5,  g:"ישן יותר"},
  {v:"1.15.2", pf:5,  g:"ישן יותר"},
  {v:"1.14.4", pf:4,  g:"ישן יותר"},
  {v:"1.13.2", pf:4,  g:"ישן יותר"},
  {v:"1.12.2", pf:3,  g:"ישן יותר"},
  {v:"1.11.2", pf:3,  g:"ישן יותר"},
  {v:"1.10.2", pf:2,  g:"ישן יותר"},
  {v:"1.9",    pf:2,  g:"ישן יותר"},
  {v:"1.8.9",  pf:1,  g:"ישן יותר"},
  {v:"1.6.1",  pf:1,  g:"ישן יותר"},
];
const pfFor = v => (VERSIONS.find(x=>x.v===v)||{}).pf || 34;
// בונה <optgroup> לפי דור, עם תמיכה בגרסה מותאמת אישית ששמורה בפרויקט
function buildVerOptions(selected){
  const groups = [];
  const seen = new Set();
  VERSIONS.forEach(x=>{ if(!seen.has(x.g)){ seen.add(x.g); groups.push(x.g); } });
  let html = groups.map(g=>{
    const opts = VERSIONS.filter(x=>x.g===g).map(x=>
      `<option value="${x.v}" ${x.v===selected?"selected":""}>${x.v} — pack_format ${x.pf}</option>`).join("");
    return `<optgroup label="${g}">${opts}</optgroup>`;
  }).join("");
  // אם הגרסה השמורה אינה ברשימה (מותאמת אישית) — נוסיף אותה למעלה
  if(selected && !VERSIONS.some(x=>x.v===selected)){
    html = `<optgroup label="מותאם אישית"><option value="${escapeAttr(selected)}" selected>${escapeHtml(selected)}</option></optgroup>` + html;
  }
  return html;
}

// ---------- IndexedDB (בייטים של ZIPים שהועלו) ----------
const DB = (()=>{
  let dbp;
  function open(){
    if(dbp) return dbp;
    dbp = new Promise((res,rej)=>{
      const r = indexedDB.open("rpm-blobs",1);
      r.onupgradeneeded = ()=> r.result.createObjectStore("blobs");
      r.onsuccess = ()=> res(r.result);
      r.onerror = ()=> rej(r.error);
    });
    return dbp;
  }
  const tx = (mode,fn)=> open().then(db=> new Promise((res,rej)=>{
    const t = db.transaction("blobs",mode);
    const s = t.objectStore("blobs");
    const rq = fn(s);
    t.oncomplete = ()=> res(rq && rq.result);
    t.onerror = ()=> rej(t.error);
  }));
  return {
    put:(key,buf)=> tx("readwrite",s=>s.put(buf,key)),
    get:(key)=> tx("readonly",s=>s.get(key)),
    del:(key)=> tx("readwrite",s=>s.delete(key)),
  };
})();

// ---------- אחסון פרויקטים (localStorage) ----------
const LS_KEY = "rpm.projects.v1";
const LS_SEL = "rpm.selected.v1";
let state = load();
let selectedId = localStorage.getItem(LS_SEL) || (state[0] && state[0].id) || null;

function load(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || []; }catch{ return []; }
}
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  updateBadge();
}
function updateBadge(){
  const nSrc = state.reduce((a,p)=>a+p.sources.length,0);
  document.getElementById("storeBadge").textContent =
    `${state.length} פרויקטים · ${nSrc} מקורות`;
}
const uid = ()=> Math.random().toString(36).slice(2,10);
const curProj = ()=> state.find(p=>p.id===selectedId);

// ---------- Modrinth API ----------
function parseModrinthSlug(url){
  try{
    const u = new URL(url);
    if(!/modrinth\.com$/.test(u.hostname.replace(/^www\./,''))) return null;
    const parts = u.pathname.split("/").filter(Boolean);
    // /resourcepack/{slug} | /mod/{slug} | /{slug}
    const known = ["resourcepack","mod","datapack","shader","plugin"];
    if(parts.length>=2 && known.includes(parts[0])) return parts[1];
    return parts[parts.length-1] || null;
  }catch{ return null; }
}
async function modrinthProject(slug){
  const r = await fetch(`https://api.modrinth.com/v2/project/${encodeURIComponent(slug)}`);
  if(!r.ok) throw new Error(`Modrinth: פרויקט לא נמצא (${r.status})`);
  return r.json();
}
async function modrinthVersions(slug){
  const r = await fetch(`https://api.modrinth.com/v2/project/${encodeURIComponent(slug)}/version`);
  if(!r.ok) throw new Error(`Modrinth: לא ניתן לטעון גרסאות (${r.status})`);
  return r.json();
}

// ---------- זיהוי סוג מקור מקישור ----------
function detectKind(url){
  try{
    const h = new URL(url).hostname.replace(/^www\./,'');
    if(/modrinth\.com$/.test(h)) return "modrinth";
    if(/curseforge\.com$/.test(h)) return "curseforge";
    if(/planetminecraft\.com$/.test(h)) return "planetminecraft";
  }catch{}
  return null;
}

/* ============================================================
   רינדור
   ============================================================ */
function renderProjects(){
  const el = document.getElementById("projectList");
  el.innerHTML = "";
  if(!state.length){
    el.innerHTML = `<div class="empty" style="margin-top:30px; font-size:12px">אין פרויקטים.<br>צור פרויקט חדש ↑</div>`;
    return;
  }
  state.forEach(p=>{
    const d = document.createElement("div");
    d.className = "proj"+(p.id===selectedId?" active":"");
    d.innerHTML = `<div class="nm">${escapeHtml(p.name)}</div>
      <span class="ct">${p.sources.length}</span>`;
    d.onclick = ()=>{ selectedId=p.id; localStorage.setItem(LS_SEL,p.id); renderAll(); };
    el.appendChild(d);
  });
}

function renderMain(){
  const main = document.getElementById("main");
  const p = curProj();
  if(!p){
    main.innerHTML = `<div class="empty">בחר פרויקט מהצד, או צור אחד חדש כדי להתחיל.<br><br>
      <span style="font-size:12px">כל פרויקט = חבילת משאבים ממוזגת אחת שאפשר לערוך בכל עת.</span></div>`;
    return;
  }
  const verOpts = buildVerOptions(p.targetVersion);
  main.innerHTML = `
    <h2 id="pTitle"></h2>
    <div class="sub">חבילת משאבים ממוזגת — המקור העליון גובר על התחתונים</div>

    <div class="card">
      <h3>⚙️ הגדרות חבילה</h3>
      <div class="row">
        <label class="fld">שם החבילה
          <input type="text" id="pName" value="${escapeAttr(p.name)}">
        </label>
        <label class="fld">גרסת מיינקראפט יעד
          <select id="pVer">${verOpts}</select>
        </label>
        <label class="fld">pack_format
          <input type="number" id="pPf" value="${p.packFormat}" style="min-width:90px">
        </label>
      </div>
      <label class="fld" style="margin-top:10px">תיאור (נכנס ל־pack.mcmeta)
        <input type="text" id="pDesc" value="${escapeAttr(p.description||"")}" style="min-width:340px">
      </label>
      <div class="row" style="margin-top:12px; align-items:center; gap:12px">

let dragSrcId = null;

function renderSources(){
  const p = curProj();
  const list = document.getElementById("srcList");
  if(!list) return;
  if(!p.sources.length){
    list.innerHTML = `<div class="hint">אין מקורות עדיין. הוסף חבילה מ־Modrinth/CurseForge/PlanetMinecraft או העלה ZIP.</div>`;
    return;
  }
  const icons = {modrinth:"🟢",curseforge:"🔥",planetminecraft:"🌍",upload:"📁"};
  list.innerHTML = "";
  // מקרא עדיפות
  const legend = document.createElement("div");
  legend.className = "prio-legend";
  legend.innerHTML = `<span>⬆️ <b>1 = הכי חשוב</b> (גובר על השאר)</span>
    <span class="dim">גרור לפי הידית ⠿ או השתמש ב־▲▼ כדי לסדר עדיפות</span>`;
  list.appendChild(legend);
  p.sources.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "src"+(s.enabled?"":" disabled");
    div.dataset.id = s.id;
    let statusChip = "";
    if(s.kind==="modrinth" && s.downloadUrl) statusChip = `<span class="chip m">אוטומטי</span>`;
    else if(s.hasBlob) statusChip = `<span class="chip m">ZIP מצורף</span>`;
    else statusChip = `<span class="chip warnc">חסר ZIP</span>`;
    const desc = s.versionName ? `${s.kind} · גרסה: ${escapeHtml(s.versionName)}`
               : s.filename ? `${s.kind} · ${escapeHtml(s.filename)}`
               : s.refUrl ? escapeHtml(s.refUrl) : s.kind;
    const prioTag = i===0 ? `<span class="prio-tag top">הכי חשוב</span>`
                  : i===p.sources.length-1 ? `<span class="prio-tag bottom">בסיס/גיבוי</span>` : "";
    div.innerHTML = `
      <div class="grip" title="גרור לשינוי עדיפות">⠿</div>
      <div class="prio">${i+1}</div>
      <div class="ico">${icons[s.kind]||"❓"}</div>
      <div class="info">
        <div class="t">${escapeHtml(s.title||"מקור")} ${statusChip} ${prioTag}</div>
        <div class="d">${desc}</div>
      </div>
      <div class="ctrls">
        <button class="ghost sm" data-act="up" ${i===0?"disabled":""} title="העלה עדיפות">▲</button>
        <button class="ghost sm" data-act="down" ${i===p.sources.length-1?"disabled":""} title="הורד עדיפות">▼</button>
        <button class="ghost sm" data-act="toggle" title="הפעל/כבה">${s.enabled?"👁":"🚫"}</button>
        <button class="danger sm" data-act="del" title="מחק">🗑</button>
      </div>`;
    div.querySelectorAll("button[data-act]").forEach(b=>{
      b.onclick = ()=>srcAction(s.id,b.dataset.act);
    });
    // גרירה לשינוי סדר — מופעלת רק דרך הידית
    const grip = div.querySelector(".grip");
    grip.addEventListener("mousedown",()=>{ div.draggable=true; });
    div.addEventListener("dragstart",e=>{ dragSrcId=s.id; div.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
    div.addEventListener("dragend",()=>{ div.draggable=false; div.classList.remove("dragging"); document.querySelectorAll(".src.over").forEach(x=>x.classList.remove("over")); });
    div.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; div.classList.add("over"); });
    div.addEventListener("dragleave",()=>div.classList.remove("over"));
    div.addEventListener("drop",e=>{ e.preventDefault(); div.classList.remove("over"); moveSource(dragSrcId, s.id); });
    list.appendChild(div);
  });
}

function moveSource(fromId,toId){
  if(!fromId || fromId===toId) return;
  const p = curProj();
  const from = p.sources.findIndex(s=>s.id===fromId);
  let to = p.sources.findIndex(s=>s.id===toId);
  if(from<0||to<0) return;
  const [moved] = p.sources.splice(from,1);
  to = p.sources.findIndex(s=>s.id===toId); // מחשבים מחדש אחרי ההסרה
  p.sources.splice(to,0,moved);
  save(); renderSources(); renderProjects();
}

function srcAction(sid,act){
  const p = curProj();
  const i = p.sources.findIndex(s=>s.id===sid);
  if(i<0) return;
  if(act==="up" && i>0){ [p.sources[i-1],p.sources[i]]=[p.sources[i],p.sources[i-1]]; }
  if(act==="down" && i<p.sources.length-1){ [p.sources[i+1],p.sources[i]]=[p.sources[i],p.sources[i+1]]; }
  if(act==="toggle"){ p.sources[i].enabled=!p.sources[i].enabled; }
  if(act==="del"){
    if(!confirm("למחוק את המקור הזה מהפרויקט?")) return;
    if(p.sources[i].hasBlob) DB.del(sid).catch(()=>{});
    p.sources.splice(i,1);
  }
  save(); renderSources(); renderProjects();
}

// מציאת קידומת השורש בתוך ZIP (טיפול ב־ZIP עטוף בתיקייה)
function findRootPrefix(zip){
  const paths = Object.keys(zip.files).filter(p=>!zip.files[p].dir);
  // מחפשים pack.mcmeta הקצר ביותר
  let mcmeta = paths.filter(p=>p.endsWith("pack.mcmeta")).sort((a,b)=>a.length-b.length)[0];
  if(mcmeta){ return mcmeta.slice(0, mcmeta.length-"pack.mcmeta".length); }
  // אחרת מחפשים assets/
  let assetsP = paths.find(p=>/(^|\/)assets\//.test(p));
  if(assetsP){ return assetsP.slice(0, assetsP.indexOf("assets/")); }
  return "";
}

// ============================================================
// מניעת "missing texture" (הדוגמת מגנטה-שחור): נורמליזציה + בדיקת שלמות
// ============================================================

// נתיב מודלים/בלוקסטייטס/הגדרות-פריט שמכילים הפניות לטקסטורות/מודלים אחרים
const REF_JSON_RE = /^assets\/[^/]+\/(models|blockstates|items)\/.*\.json$/;

// מיינקראפט דורש אותיות קטנות בכל שמות הקבצים; ריפרנס עם case שונה מהקובץ בפועל = טקסטורה חסרה במשחק
function normalizeResourceLocation(loc){
  if(typeof loc!=="string" || loc.startsWith("#")) return loc; // "#x" = הפניה למשתנה טקסטורה, לא נתיב קובץ
  const idx = loc.indexOf(":");
  if(idx<0) return loc.toLowerCase();
  return loc.slice(0,idx).toLowerCase()+":"+loc.slice(idx+1).toLowerCase();
}

// הליכה רקורסיבית על JSON של מודל/בלוקסטייט/הגדרת-פריט: מנרמלת ל-lowercase ואוספת הפניות (textures / parent / model / base)
function walkModelRefs(node, refs){
  if(Array.isArray(node)){ node.forEach(n=>walkModelRefs(n,refs)); return; }
  if(node && typeof node==="object"){
    for(const key of Object.keys(node)){
      const val = node[key];
      if(key==="textures" && val && typeof val==="object" && !Array.isArray(val)){
        for(const tk of Object.keys(val)){
          if(typeof val[tk]==="string"){
            val[tk] = normalizeResourceLocation(val[tk]);
            if(refs && !val[tk].startsWith("#")) refs.textures.add(val[tk]);
          }
        }
        continue;
      }
      if((key==="model"||key==="parent"||key==="base") && typeof val==="string"){
        node[key] = normalizeResourceLocation(val);
        if(refs) refs.models.add(node[key]);
        continue;
      }
      walkModelRefs(val, refs);
    }
  }
}

function resolveNsPath(ref){
  const idx = ref.indexOf(":");
  return idx<0 ? {ns:"minecraft", path:ref} : {ns:ref.slice(0,idx), path:ref.slice(idx+1)};
}

const zipIndexCache = new Map(); // source.id -> {files:Set<string lowercase rel path>, byBasename:Map<string,[{ns,kind,path}]>}

async function getSourceIndex(s){
  if(zipIndexCache.has(s.id)) return zipIndexCache.get(s.id);
  const bytes = await getSourceBytes(s);
  const zip = await JSZip.loadAsync(bytes);
  const prefix = findRootPrefix(zip);
  const files = new Set();
  const byBasename = new Map();
  for(const pth of Object.keys(zip.files)){
    if(zip.files[pth].dir || !pth.startsWith(prefix)) continue;
    const rel = pth.slice(prefix.length).toLowerCase();
    if(!rel) continue;
    files.add(rel);
    const m = rel.match(ASSET_RE);
    if(m){
      const ns=m[1], kind=KIND_FOLDER[m[2]], path=m[3];
      const basename = path.split("/").pop();
      if(!byBasename.has(basename)) byBasename.set(basename,[]);
      byBasename.get(basename).push({ns,kind,path});
    }
  }
  const idx = {files, byBasename};
  zipIndexCache.set(s.id, idx);
  return idx;
}

async function searchItem(rawQuery){
  const el = document.getElementById("itemSearchResults");
  let q = (rawQuery||"").trim().toLowerCase().replace(/\s+/g,"_");
  if(!q){ el.innerHTML = `<span class="hint">הקלד שם פריט לחיפוש.</span>`; return; }
  el.innerHTML = `<span class="hint"><span class="spinner"></span> טוען מקורות ובודק...</span>`;

  let targetNs="minecraft", targetPath=q;
  const ci = q.indexOf(":");
  if(ci>=0){ targetNs=q.slice(0,ci)||"minecraft"; targetPath=q.slice(ci+1); }
  targetPath = targetPath.replace(/\.(json|png)$/,"");
  if(!targetPath){ el.innerHTML = `<span class="hint">שם פריט לא תקין.</span>`; return; }

  const p = curProj();
  const enabledSources = p.sources.filter(s=>s.enabled);
  const loadedIdx = new Map();
  const skipped = [];
  for(const s of enabledSources){
    try{ loadedIdx.set(s.id, await getSourceIndex(s)); }
    catch(err){ skipped.push({title:s.title, reason:err.message}); }
  }

  const rows = [];
  for(const [kind,label] of Object.entries(KIND_LABEL)){
    const ext = kind.endsWith("texture") ? "png" : "json";
    const folder = Object.keys(KIND_FOLDER).find(f=>KIND_FOLDER[f]===kind);
    const full = `assets/${targetNs}/${folder}/${targetPath}.${ext}`;
    let winner=null;
    for(const s of enabledSources){
      const idx = loadedIdx.get(s.id); if(!idx) continue;
      if(idx.files.has(full)){ winner=s; break; }
    }
    rows.push({kind,label,full,winner});
  }

  const lastSeg = targetPath.split("/").pop();
  const suggestions = [];
  for(const s of enabledSources){
    const idx = loadedIdx.get(s.id); if(!idx) continue;
    const arr = idx.byBasename.get(lastSeg);
    if(!arr) continue;
    for(const rec of arr){
      if(rec.ns===targetNs && rec.path===targetPath) continue; // כבר נספר כהתאמה מדויקת
      suggestions.push({...rec, sourceTitle:s.title});
    }
  }

  renderItemSearchResults({q, targetNs, targetPath, rows, suggestions, skipped, enabledCount:enabledSources.length, p});
}

function renderItemSearchResults({q, targetNs, targetPath, rows, suggestions, skipped, enabledCount, p}){
  const el = document.getElementById("itemSearchResults");
  if(!enabledCount){ el.innerHTML = `<span class="hint">אין מקורות פעילים בפרויקט.</span>`; return; }
  const anyWinner = rows.some(r=>r.winner);
  let html = `<div class="hint" style="margin-bottom:8px">מחפש: <code>${escapeHtml(targetNs)}:${escapeHtml(targetPath)}</code></div>`;
  html += `<table class="res"><thead><tr><th>סוג</th><th>אחראי</th><th>נתיב</th></tr></thead><tbody>`;
  for(const r of rows){
    const badge = r.winner
      ? `<span class="chip m">#${p.sources.indexOf(r.winner)+1} ${escapeHtml(r.winner.title)}</span>`
      : `<span class="chip">וניל — ברירת מחדל של מיינקראפט</span>`;
    html += `<tr><td>${escapeHtml(r.label)}</td><td>${badge}</td><td class="path">${escapeHtml(r.full)}</td></tr>`;
  }
  html += `</tbody></table>`;
  if(!anyWinner){
    html += `<div class="hint" style="margin-top:8px">אף אחד מהמקורות שלך לא דורס את <code>${escapeHtml(targetNs)}:${escapeHtml(targetPath)}</code> — הוא יופיע בטקסטורה/מודל הרגילים של מיינקראפט בחבילה הממוזגת.</div>`;
  }
  if(suggestions.length){
    const uniq = [];
    const seen = new Set();
    for(const s of suggestions){
      const key = s.ns+":"+s.path+":"+s.kind;
      if(seen.has(key)) continue; seen.add(key); uniq.push(s);
    }
    html += `<div class="hint" style="margin-top:12px">🔎 נמצאו גם התאמות בשם דומה ב-namespaces אחרים (אולי זה מה שהתכוונת אליו):</div>`;
    html += `<div class="row" style="margin-top:6px">`;
    uniq.slice(0,12).forEach(s=>{
      const full = `${s.ns}:${s.path}`;
      html += `<span class="chip link" data-goto="${escapeAttr(full)}" title="${escapeAttr(KIND_LABEL[s.kind])} · ${escapeAttr(s.sourceTitle)}">${escapeHtml(full)}</span>`;
    });
    html += `</div>`;
  }
  if(skipped.length){
    html += `<div class="hint" style="margin-top:12px; color:var(--warn)">⚠️ לא ניתן היה לבדוק ${skipped.length} מקור/ות (חסר ZIP או שגיאת הורדה): ${skipped.map(s=>escapeHtml(s.title)).join(", ")}</div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll(".chip.link").forEach(chip=>{
    chip.addEventListener("click",()=>{
      const v = chip.dataset.goto;
      document.getElementById("itemQuery").value = v;
      searchItem(v);
    });
  });
}

// ממזג את כל המקורות הפעילים ומחזיר {blob, fname} — או null בכשל. משותף להורדת ZIP ולבניית EXE.
async function buildMergedPack(){
  const p = curProj();
  const sources = p.sources.filter(s=>s.enabled);
  if(!sources.length){ logLine("אין מקורות פעילים.","err"); return null; }
  {
    logLine(`מתחיל מיזוג של <b>${sources.length}</b> מקורות → "${escapeHtml(p.name)}"`,"dim");
    logLine(`מתחיל מיזוג של <b>${sources.length}</b> מקורות → "${escapeHtml(p.name)}"`,"dim");

    // מ־top לתחתון. index 0 = הכי גבוה (גובר)
    const out = new JSZip();
    const claimed = new Map();       // path (lowercase) -> {title} (מי כתב ראשון = גבר)
    const conflicts = [];            // {path, winner, loser}
    const jsonOverlaps = [];         // JSON חופפים לבדיקה ידנית
    let iconBytes = null, iconFrom=null;
    let caseFixed = 0, jsonBroken = 0;

    for(let i=0;i<sources.length;i++){
      const s = sources[i];
      logLine(`<span class="dim">[${i+1}/${sources.length}]</span> ${escapeHtml(s.title)} — טוען...`);
      let bytes;
      try{ bytes = await getSourceBytes(s); }
      catch(err){ logLine(`&nbsp;&nbsp;↳ דילוג: ${escapeHtml(err.message)}`,"err"); continue; }

      let zip;
      try{ zip = await JSZip.loadAsync(bytes); }
      catch(err){ logLine(`&nbsp;&nbsp;↳ קובץ ZIP לא תקין, דילוג`,"err"); continue; }

      const prefix = findRootPrefix(zip);
      const entries = Object.keys(zip.files).filter(pth=>!zip.files[pth].dir);
      let added=0, over=0;
      for(const pth of entries){
        if(!pth.startsWith(prefix)) continue;
        let rel = pth.slice(prefix.length);
        if(!rel) continue;
        // מדלגים על מטא־דאטה של המקור (ניצור חדש)
        if(rel==="pack.mcmeta"){ continue; }
        if(rel==="pack.png"){ if(!iconBytes){ iconBytes = await zip.files[pth].async("uint8array"); iconFrom=s.title; } continue; }

        // מיינקראפט דורש נתיבי-קבצים באותיות קטנות — נתיב "מעורב" הוא גורם נפוץ ל-missing texture
        const lowRel = rel.toLowerCase();
        if(lowRel!==rel) caseFixed++;

        if(claimed.has(lowRel)){
          over++;
          conflicts.push({path:lowRel, winner:claimed.get(lowRel).title, loser:s.title});
          if(/\.(json|txt)$/.test(lowRel) && /(sounds\.json|\/lang\/|\.lang$)/.test(lowRel)){
            jsonOverlaps.push({path:lowRel, winner:claimed.get(lowRel).title, loser:s.title});
          }
          continue; // כבר נכתב ע"י מקור בעדיפות גבוהה יותר
        }
        let data = await zip.files[pth].async("uint8array");

        // נרמול הפניות טקסטורה/מודל בתוך JSON למניעת missing texture עקב אי-התאמת רישיות
        if(REF_JSON_RE.test(lowRel)){
          try{
            const text = new TextDecoder("utf-8").decode(data);
            const obj = JSON.parse(text);
            walkModelRefs(obj, null);
            data = new TextEncoder().encode(JSON.stringify(obj));
          }catch{ jsonBroken++; /* משאירים כמות שהוא, לא חוסם מיזוג */ }
        }

        out.file(lowRel, data);
        claimed.set(lowRel,{title:s.title, id:s.id});
        added++;
      }
      logLine(`&nbsp;&nbsp;↳ נוספו <b>${added}</b> קבצים, ${over} נדרסו (עדיפות נמוכה)`, "ok");
    }

    if(!claimed.size){ logLine("לא נמצאו קבצים למיזוג.","err"); return null; }
    if(caseFixed) logLine(`🔡 תוקנו ${caseFixed} נתיבי-קבצים לאותיות קטנות (מונע missing texture מאי-התאמת רישיות)`,"dim");
    if(jsonBroken) logLine(`⚠️ ${jsonBroken} קבצי JSON של מודלים/בלוקסטייטס לא היו תקינים ולא נורמלו (הועתקו כמות שהם)`,"warn");

    // מניעת "2 דברים על דבר אחד": טקסטורה מונפשת (X.png) וקובץ האנימציה שלה (X.png.mcmeta) חייבים
    // להגיע מאותו מקור — אם הם מגיעים ממקורות שונים (כי כל אחד "ניצח" בנפרד לפי עדיפות), הממדים/
    // מספר הפריימים כנראה לא תואמים, וזה בדיוק מה שגורם לאנימציה מתוחה/שבורה (מים, לבה, פורטל וכו').
    const mismatchedAnim = [];
    for(const path of [...claimed.keys()]){
      if(!/^assets\/[^/]+\/textures\/.*\.png$/.test(path)) continue;
      const mcPath = path+".mcmeta";
      const pngWin = claimed.get(path);
      const mcWin = claimed.get(mcPath);
      if(mcWin && mcWin.id!==pngWin.id){
        out.remove(mcPath);
        claimed.delete(mcPath);
        mismatchedAnim.push({path, pngFrom:pngWin.title, mcmetaFrom:mcWin.title});
      }
    }
    if(mismatchedAnim.length){
      logLine(`🎞️ נמנעו ${mismatchedAnim.length} התנגשויות אנימציה (הטקסטורה וקובץ האנימציה שלה הגיעו ממקורות שונים ולא תואמים) — האנימציה הוסרה כדי למנוע גליץ':`,"warn");
      mismatchedAnim.slice(0,10).forEach(m=>logLine(`&nbsp;&nbsp;• ${escapeHtml(m.path)} — טקסטורה מ־${escapeHtml(m.pngFrom)}, אנימציה (הוסרה) הייתה מ־${escapeHtml(m.mcmetaFrom)}`,"warn"));
    }

    // pack.mcmeta חדש
    const mcmeta = {
      pack:{
        pack_format: p.packFormat,
        description: p.description || `${p.name} — merged pack`
      }
    };
    out.file("pack.mcmeta", JSON.stringify(mcmeta,null,2));
    // אייקון מותאם אישית של הפרויקט גובר על אייקון מהמקור העליון
    if(p.hasIcon){
      try{
        const custom = await DB.get("icon:"+p.id);
        if(custom){ iconBytes = new Uint8Array(custom); iconFrom = "מותאם אישית"; }
      }catch{}
    }
    if(iconBytes){ out.file("pack.png", iconBytes); logLine(`אייקון pack.png נלקח מ־"${escapeHtml(iconFrom)}"`,"dim"); }

    logLine(`<b>${claimed.size}</b> קבצים ייחודיים · <b>${conflicts.length}</b> התנגשויות נפתרו לפי עדיפות`,"ok");
    if(jsonOverlaps.length){
      logLine(`⚠️ ${jsonOverlaps.length} קבצי sounds.json/שפה חופפים — מיינקראפט לוקח את הקובץ השלם מהמקור העליון. אם צריך מיזוג תוכן, בדוק ידנית:`,"warn");
      jsonOverlaps.slice(0,8).forEach(c=>logLine(`&nbsp;&nbsp;• ${escapeHtml(c.path)} (נשמר: ${escapeHtml(c.winner)})`,"warn"));
    }

    // בדיקת שלמות: הפניות שבורות ל-namespaces מותאמים אישית = ודאי missing texture (מגנטה-שחור) במשחק
    logLine("🧪 בודק הפניות שבורות לטקסטורות/מודלים (namespaces מותאמים אישית)...","dim");
    const missingTex = [], missingMdl = [];
    const modelJsonPaths = Object.keys(out.files).filter(p=>!out.files[p].dir && REF_JSON_RE.test(p));
    for(const pth of modelJsonPaths){
      let obj;
      try{ obj = JSON.parse(await out.files[pth].async("string")); }catch{ continue; }
      const refs = {textures:new Set(), models:new Set()};
      walkModelRefs(obj, refs);
      for(const t of refs.textures){
        const {ns,path:tp} = resolveNsPath(t);
        if(ns==="minecraft") continue; // מניחים שוניל מספק — אין דרך לדעת בלי לצרף את כל assets ה-vanilla
        const full = `assets/${ns}/textures/${tp}.png`;
        if(!out.files[full]) missingTex.push({ref:t, full, from:pth});
      }
      for(const m of refs.models){
        const {ns,path:mp} = resolveNsPath(m);
        if(ns==="minecraft") continue;
        const full = `assets/${ns}/models/${mp}.json`;
        if(!out.files[full]) missingMdl.push({ref:m, full, from:pth});
      }
    }
    // אותה בדיקה, גם עבור קובצי סאונד המוזכרים ב-sounds.json (namespaces מותאמים אישית)
    const missingSnd = [];
    const soundsJsonPaths = Object.keys(out.files).filter(p=>!out.files[p].dir && /^assets\/[^/]+\/sounds\.json$/.test(p));
    for(const pth of soundsJsonPaths){
      let obj;
      try{ obj = JSON.parse(await out.files[pth].async("string")); }catch{ continue; }
      for(const evKey of Object.keys(obj)){
        const ev = obj[evKey];
        const list = Array.isArray(ev&&ev.sounds) ? ev.sounds : [];
        for(const snd of list){
          const name = typeof snd==="string" ? snd : (snd&&snd.name);
          if(!name) continue;
          const {ns,path:sp} = resolveNsPath(normalizeResourceLocation(name));
          if(ns==="minecraft") continue;
          const full = `assets/${ns}/sounds/${sp}.ogg`;
          if(!out.files[full]) missingSnd.push({ref:name, full, from:pth});
        }
      }
    }

    if(missingTex.length || missingMdl.length || missingSnd.length){
      logLine(`❌ נמצאו <b>${missingTex.length}</b> הפניות לטקסטורות, <b>${missingMdl.length}</b> למודלים ו-<b>${missingSnd.length}</b> לקובצי סאונד שחסרים בפועל — אלה יופיעו כטקסטורה שחורה-ורודה (missing texture) או סאונד שקט/שגיאה במשחק:`,"err");
      missingTex.slice(0,15).forEach(m=>logLine(`&nbsp;&nbsp;🖼️ טקסטורה חסרה: <b>${escapeHtml(m.full)}</b> — מוזכר ב־${escapeHtml(m.from)}`,"err"));
      missingMdl.slice(0,15).forEach(m=>logLine(`&nbsp;&nbsp;🧱 מודל חסר: <b>${escapeHtml(m.full)}</b> — מוזכר ב־${escapeHtml(m.from)}`,"err"));
      missingSnd.slice(0,15).forEach(m=>logLine(`&nbsp;&nbsp;🔊 סאונד חסר: <b>${escapeHtml(m.full)}</b> — מוזכר ב־${escapeHtml(m.from)}`,"err"));
      const extra = (missingTex.length+missingMdl.length+missingSnd.length)-45;
      if(extra>0) logLine(`&nbsp;&nbsp;...ועוד ${extra} נוספים`,"err");
      logLine(`↳ תקן זאת במקור (חסר קובץ תואם), או הוסף מקור נוסף שמספק אותו.`,"warn");
    } else {
      logLine("✅ לא נמצאו הפניות שבורות ב-namespaces מותאמים אישית.","ok");
    }

    logLine("דוחס ל־ZIP...","dim");
    const blob = await out.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const fname = (p.name||"pack").replace(/[^\w֐-׿ .-]/g,"_")+".zip";
    return {blob, fname};
  }
}

async function buildProject(){
  const log = document.getElementById("buildLog");
  log.style.display="block"; log.innerHTML="";
  const btn = document.getElementById("buildBtn");
  btn.disabled=true;
  try{
    const r = await buildMergedPack();
    if(!r) return;
    downloadBlob(r.blob, r.fname);
    logLine(`✅ הושלם! הורד: <b>${escapeHtml(r.fname)}</b> (${(r.blob.size/1024/1024).toFixed(2)} MB)`,"ok");
  }catch(err){
    logLine("שגיאה כללית: "+escapeHtml(err.message),"err");
    console.error(err);
  }finally{
    btn.disabled=false;
  }
}

// ---- PE: איתור והחלפת אייקון ה-EXE (RT_ICON) בזמן בניית המתקין ----
// ה-stub נבנה עם משבצת אייקון יחידה 256x256 32-bit לא-דחוסה, כך שאפשר להחליף
// את הבייטים במקום בלי לשבור את מבנה ה-PE.
function findRtIcon(buf){
  const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  const u16 = o => dv.getUint16(o, true), u32 = o => dv.getUint32(o, true);
  if(u16(0)!==0x5A4D) throw new Error("לא PE תקין");
  const pe = u32(0x3C);
  if(u32(pe)!==0x00004550) throw new Error("חתימת PE חסרה");
  const coff = pe+4;
  const numSections = u16(coff+2), sizeOpt = u16(coff+16), optStart = coff+20;
  const magic = u16(optStart);
  const dataDir = optStart + (magic===0x20b ? 112 : 96);
  const resRva = u32(dataDir + 16); // Data directory index 2 (Resource): +2*8
  const secStart = optStart + sizeOpt, secs = [];
  for(let i=0;i<numSections;i++){ const s=secStart+i*40; secs.push({va:u32(s+12),vsize:u32(s+8),raw:u32(s+16),praw:u32(s+20)}); }
  const rvaToOff = rva => { for(const s of secs){ const sz=Math.max(s.vsize,s.raw); if(rva>=s.va && rva<s.va+sz) return s.praw+(rva-s.va);} throw new Error("RVA מחוץ לסקשנים"); };
  const resBase = rvaToOff(resRva);
  const entries = dirOff => { const n=u16(dirOff+12)+u16(dirOff+14), list=[]; let e=dirOff+16; for(let i=0;i<n;i++,e+=8) list.push({id:u32(e),off:u32(e+4)}); return list; };
  const t = entries(resBase).find(en => en.id===3); // RT_ICON
  if(!t || !(t.off & 0x80000000)) throw new Error("RT_ICON לא נמצא");
  const lvl2 = entries(resBase + (t.off & 0x7fffffff));
  if(!lvl2.length) throw new Error("RT_ICON ריק");
  const f = lvl2[0];
  const leaf = (f.off & 0x80000000)
    ? resBase + (entries(resBase+(f.off&0x7fffffff))[0].off & 0x7fffffff)
    : resBase + (f.off & 0x7fffffff);
  return { offset: rvaToOff(u32(leaf)), size: u32(leaf+4) };
}
// RGBA (top-down) → DIB של אייקון: BITMAPINFOHEADER + BGRA bottom-up + AND mask אפסים
function rgbaToIconDib(rgba, S){
  const out = new Uint8Array(40 + S*S*4 + ((S+31)>>5)*4*S);
  const hv = new DataView(out.buffer);
  hv.setUint32(0,40,true); hv.setInt32(4,S,true); hv.setInt32(8,S*2,true);
  hv.setUint16(12,1,true); hv.setUint16(14,32,true); hv.setUint32(20,S*S*4,true);
  let o=40;
  for(let y=S-1;y>=0;y--){ for(let x=0;x<S;x++){ const i=(y*S+x)*4; out[o++]=rgba[i+2]; out[o++]=rgba[i+1]; out[o++]=rgba[i]; out[o++]=rgba[i+3]; } }
  return out; // שאר (AND mask) כבר אפסים
}
// bytes של תמונה → DIB בגודל 256x256 (מצייר לקנבס וממיר)
async function imageBytesToIconDib(bytes){
  const url = URL.createObjectURL(new Blob([bytes]));
  try{
    const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error("תמונה לא תקינה")); im.src=url; });
    const S=256, c=document.createElement("canvas"); c.width=S; c.height=S;
    const ctx=c.getContext("2d"); ctx.clearRect(0,0,S,S); ctx.drawImage(img,0,0,S,S);
    return rgbaToIconDib(new Uint8Array(ctx.getImageData(0,0,S,S).data), S);
  } finally { URL.revokeObjectURL(url); }
}

// בונה EXE מתקין עם החבילה מוטמעת בזנב (self-extracting), ומוריד אותו — בלי releases.
const STUB_URL = "installer/MC-Pack-Installer-stub.exe";
const EMBED_MAGIC = "MCPKZIP1";
async function buildInstallerExe(){
  const log = document.getElementById("buildLog");
  log.style.display="block"; log.innerHTML="";
  const btn = document.getElementById("buildExeBtn");
  const buildBtn = document.getElementById("buildBtn");
  btn.disabled=true; buildBtn.disabled=true;
  try{
    const r = await buildMergedPack();
    if(!r) return;
    logLine("מוריד את בסיס המתקין (stub)...","dim");
    let stubBuf;
    try{
      const resp = await fetch(STUB_URL);
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
      stubBuf = new Uint8Array(await resp.arrayBuffer());
    }catch(err){
      logLine(`❌ לא ניתן להוריד את בסיס המתקין (${escapeHtml(err.message)}). ודא שהקובץ ${escapeHtml(STUB_URL)} קיים לצד האתר.`,"err");
      return;
    }
    if(stubBuf.byteLength < 100000){
      logLine("❌ בסיס המתקין נראה לא תקין (קטן מדי). ודא שקובץ ה-EXE הועלה כראוי (לא Git LFS pointer).","err");
      return;
    }
    // אם לפרויקט יש אייקון מותאם אישית — מחליפים גם את אייקון ה-EXE (אותה תמונה כמו pack.png)
    const p = curProj();
    if(p.hasIcon){
      try{
        const iconBytes = await DB.get("icon:"+p.id);
        if(iconBytes){
          const dib = await imageBytesToIconDib(new Uint8Array(iconBytes));
          const slot = findRtIcon(stubBuf);
          if(dib.length===slot.size){
            stubBuf.set(dib, slot.offset);
            logLine("🎨 אייקון ה-EXE הוחלף באייקון החבילה","dim");
          } else {
            logLine(`⚠️ גודל אייקון לא תואם למשבצת (${dib.length}≠${slot.size}) — אייקון ברירת המחדל יישאר`,"warn");
          }
        }
      }catch(err){
        logLine(`⚠️ החלפת אייקון ה-EXE נכשלה (${escapeHtml(err.message)}) — אייקון ברירת המחדל יישאר`,"warn");
      }
    }
    logLine("מרכיב את ה-EXE עם החבילה בפנים...","dim");
    const packBytes = new Uint8Array(await r.blob.arrayBuffer());
    const nameBytes = new TextEncoder().encode(r.fname);
    // block = name_len(2 LE) + name + zip
    const block = new Uint8Array(2 + nameBytes.length + packBytes.length);
    new DataView(block.buffer).setUint16(0, nameBytes.length, true);
    block.set(nameBytes, 2);
    block.set(packBytes, 2 + nameBytes.length);
    // footer = MAGIC(8) + block_len(8 LE)
    const footer = new Uint8Array(16);
    footer.set(new TextEncoder().encode(EMBED_MAGIC), 0);
    new DataView(footer.buffer).setBigUint64(8, BigInt(block.length), true);
    const exeBlob = new Blob([stubBuf, block, footer], {type:"application/octet-stream"});
    const exeName = (curProj().name||"pack").replace(/[^\w֐-׿ .-]/g,"_")+"-Installer.exe";
    downloadBlob(exeBlob, exeName);
    logLine(`✅ נוצר מתקין עצמאי: <b>${escapeHtml(exeName)}</b> (${(exeBlob.size/1024/1024).toFixed(2)} MB)`,"ok");
    logLine("הפעל אותו במחשב עם מיינקראפט → סמן instances → התקן. החבילה כבר בפנים.","dim");
  }catch(err){
    logLine("שגיאה כללית: "+escapeHtml(err.message),"err");
    console.error(err);
  }finally{
    btn.disabled=false; buildBtn.disabled=false;
  }
}

/* ============================================================
   ייצוא / ייבוא פרויקט (JSON נייד — כולל בייטים של ZIPים)
   ============================================================ */
const EXPORT_SCHEMA = "rpm-project-export/1";

// ArrayBuffer/Uint8Array <-> base64, בפיסות כדי לא לפוצץ את מחסנית הקריאות בקבצים גדולים
function bytesToBase64(bytes){
  bytes = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  const CHUNK = 0x8000;
  let binary = "";
  for(let i=0;i<bytes.length;i+=CHUNK){
    binary += String.fromCharCode.apply(null, bytes.subarray(i,i+CHUNK));
  }
  return btoa(binary);
}
function base64ToBytes(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function exportProject(p){
  const statusEl = document.getElementById("exportStatus");
  const setStatus = (html)=>{ if(statusEl) statusEl.innerHTML = html; };
  setStatus(`<span class="spinner"></span> אוסף קבצים...`);
  try{
    const sources = [];
    for(const s of p.sources){
      const copy = {...s};
      if(copy.hasBlob){
        const buf = await DB.get(copy.id);
        if(buf) copy.blobBase64 = bytesToBase64(buf);
        else { copy.hasBlob = false; }
      }
      sources.push(copy);
    }
    let iconBase64 = null;
    if(p.hasIcon){
      try{ const ib = await DB.get("icon:"+p.id); if(ib) iconBase64 = bytesToBase64(ib); }catch{}
    }
    const payload = {
      schema: EXPORT_SCHEMA,
      exportedAt: new Date().toISOString(),
      project: {
        name: p.name, targetVersion: p.targetVersion, packFormat: p.packFormat,
        description: p.description||"", sources,
        iconName: p.iconName||null, iconBase64,
      }
    };
    const json = JSON.stringify(payload);
    const blob = new Blob([json], {type:"application/json"});
    const fname = (p.name||"project").replace(/[^\w֐-׿ .-]/g,"_")+".rpmproject.json";
    downloadBlob(blob,fname);
    setStatus(`<span style="color:var(--accent2)">✅ יוצא: ${escapeHtml(fname)} (${(blob.size/1024/1024).toFixed(2)} MB) — כולל ${sources.filter(s=>s.blobBase64).length} קבצי ZIP מוטמעים</span>`);
  }catch(err){
    setStatus(`<span style="color:var(--danger)">שגיאת ייצוא: ${escapeHtml(err.message)}</span>`);
  }
}

async function importProjectFromFile(file){
  let payload;
  try{ payload = JSON.parse(await file.text()); }
  catch{ alert("קובץ לא תקין — לא JSON."); return; }
  if(!payload || payload.schema!==EXPORT_SCHEMA || !payload.project){
    alert("זה לא קובץ ייצוא פרויקט תקין של הכלי הזה."); return;
  }
  const src = payload.project;
  const newP = {
    id:uid(),
    name:(src.name||"פרויקט מיובא")+" (מיובא)",
    targetVersion: src.targetVersion || "1.21.6",
    packFormat: src.packFormat || pfFor(src.targetVersion||"1.21.6"),
    description: src.description||"",
    sources: [],
  };
  for(const s of (src.sources||[])){
    const ns = {...s};
    delete ns.blobBase64;
    ns.id = uid();
    if(s.blobBase64){
      try{ await DB.put(ns.id, base64ToBytes(s.blobBase64).buffer); ns.hasBlob=true; }
      catch{ ns.hasBlob=false; }
    }
    newP.sources.push(ns);
  }
  if(src.iconBase64){
    try{ await DB.put("icon:"+newP.id, base64ToBytes(src.iconBase64).buffer); newP.hasIcon=true; newP.iconName=src.iconName||null; }
    catch{ newP.hasIcon=false; }
  }
  state.unshift(newP); selectedId=newP.id; localStorage.setItem(LS_SEL,newP.id);
  save(); renderAll();
  alert(`הפרויקט "${newP.name}" יובא בהצלחה עם ${newP.sources.length} מקורות, כולל הסדר, האייקון וקובצי ה־ZIP.`);
}

document.getElementById("importProjBtn").addEventListener("click",()=>{
  document.getElementById("importProjFile").click();
});
document.getElementById("importProjFile").addEventListener("change",async(e)=>{
  const f = e.target.files[0];
  e.target.value = ""; // מאפשר לייבא שוב אותו קובץ בעתיד
  if(f) await importProjectFromFile(f);
});

/* ============================================================
   עזרים
   ============================================================ */
function downloadBlob(blob,name){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
function escapeHtml(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }

let _iconPreviewUrl = null;
async function refreshIconPreview(p){
  const box = document.getElementById("iconPreview");
  const hint = document.getElementById("iconHint");
  const rm = document.getElementById("iconRemoveBtn");
  if(!box) return;
  if(_iconPreviewUrl){ URL.revokeObjectURL(_iconPreviewUrl); _iconPreviewUrl=null; }
  if(p.hasIcon){
    try{
      const bytes = await DB.get("icon:"+p.id);
      if(bytes){
        _iconPreviewUrl = URL.createObjectURL(new Blob([bytes]));
        box.style.backgroundImage = `url(${_iconPreviewUrl})`;
        box.textContent = "";
        if(hint) hint.textContent = p.iconName || "אייקון מותאם אישית";
        if(rm) rm.disabled = false;
        return;
      }
    }catch{}
  }
  box.style.backgroundImage = "";
  box.textContent = "🖼️";
  if(hint) hint.textContent = "ברירת מחדל: אייקון מהמקור העליון";
  if(rm) rm.disabled = true;
}
